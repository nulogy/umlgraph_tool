config:
  CsvImporterBasicRoot:
    - '@hidden'
  UMLOptions:
    - '@opt vertical'
    - '@opt attributes'
    - '@opt operations'
    - '@hidden'

framework lightgray:
  BaseCsvPresenter:
  ColumnDefinitionInterpreter:
    - '@depend - - - CustomerImporter'
    - '@depend - - - SkusImporter'
  CsvImporter:
    - '@depend - - - ColumnDefinitionInterpreter'
    - 'void csv_import() {}'
    - 'void column_definition() {}'
    - 'void presenter() {}'
    - 'void before_run() {}'
    - 'void before_row() {}'
    - 'void materialize_row() {}'
    - 'void after_processing_rows() {}'
    - 'void after_run() {}'

customer lightblue:
  CustomerPresenter extends BaseCsvPresenter:
  CustomerImporter extends CsvImporter:
    - '@depend - - - CustomerPresenter'
    - 'void column_definition() {}'
    - 'void materialize_row() {}'
    - 'void presenter() {}'

sku lightcoral:
  SkusPresenter extends BaseCsvPresenter:
  SkusImporter extends CsvImporter:
    - '@depend - - - SkusPresenter'
    - 'void column_definition() {}'
    - 'void materialize_row() {}'
    - 'void presenter() {}'

