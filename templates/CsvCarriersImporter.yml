config:
  CsvCarriersImporterRoot:
    - '@hidden'
  UMLOptions:
    - '@opt vertical'
    - '@opt attributes'
    - '@opt operations'
    - '@hidden'

framework lightgray:
  BaseCsvPresenter:
  ColumnDefinitionInterpreter:
    - '@depend - - - CarriersImporter'
  CsvImporter:
    - '@depend - - - ColumnDefinitionInterpreter'
    - 'void csv_import() {}'
    - 'void presenter() {}'
    - 'void column_definition() {}'
    - 'void before_run() {}'
    - 'void before_row() {}'
    - 'void materialize_row() {}'
    - 'void after_processing_rows() {}'
    - 'void after_run() {}'

variation lightblue:
  CarriersPresenter extends BaseCsvPresenter:
  CarriersImporter extends CsvImporter:
    - '@depend - - - CarriersPresenter'
    - 'void presenter() {}'
    - 'void materialize_row() {}'

caller palegreen:
  CarriersController:
    - '@depend - - - CarriersImporter'
