config:
  CsvImporterBadgeTypesRoot:
    - '@hidden'
  UMLOptions:
    - '@opt vertical'
    - '@opt attributes'
    - '@opt operations'
    - '@hidden'

framework lightgray:
  BaseCsvPresenter:
  ColumnDefinitionInterpreter:
    - '@depend - - - BadgeTypesImporter'
  CsvImporter:
    - '@depend - - - ColumnDefinitionInterpreter'
    - 'void csv_import() {}'
    - 'void presenter() {}'
    - 'void column_definition() {}'
    - 'void before_run() {}'
    - 'void before_row() {}'
    - 'void materialize_row() {}'
    - 'void after_processing_rows() {}'
    - 'void after_run() {}'

variation lightblue:
  BadgeTypesPresenter extends BaseCsvPresenter:
  BadgeTypesImporter extends CsvImporter:
    - '@depend - - - BadgeTypesPresenter'
    - 'void presenter() {}'
    - 'void materialize_row() {}'

caller palegreen:
  BadgeTypesController:
    - '@depend - - - BadgeTypesImporter'
