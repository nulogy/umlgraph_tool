#
# Automated Production Entry
#

#
# Notes:
#
# 1. Why is there a belongs_to :production on an ExternalProductionEntry? Use has_one instead?
#

config:
  AddProductionRoot:
    - '@hidden'
  UMLOptions:
    - '@opt vertical'
    - '@opt attributes'
    - '@opt operations'
    - '@hidden'

automated_production_entry lightcoral:
  BlockedProductionEntriesAction:
    - '@depend - - - ExternalProductionEntryQueue'
  BlockedProductionEntriesActionFactory:
    - '@depend - create - BlockedProductionEntriesAction'
    - '@depend - - - BackgroundTasksForJob'
  BackgroundTasksForJob:
  BlockedProductionEntriesProcessor:
    - '@hidden'
    - '@has - - - Job'
    - '@depend - - - ExternalProductionEntryProcessor'
  ExternalProductionEntry:
  ExternalProductionEntryProcessor:
    - '@depend - - - ExternalProductionEntry'
    - '@depend - - - ProductionCreateCommand'
    - '@depend - - - WipMessage'
  ExternalProductionEntryQueue:
    - '@depend - - - AddCommand'
    - '@depend - - - DiscardCommand'
    - '@depend - - - ProcessCommand'
    - '@depend - - - ReviseCommand'
  FirstBlockedProductionEntriesProcessor:
    - '@hidden'
    - '@depend - - - ExternalProductionEntryProcessor'

automated_production_entry_commands crimson:
  AddCommand:
    - '@depend - - - ExternalProductionEntry'
    - '@depend - - - ExternalProductionEntryProcessor'
  DiscardCommand:
    - '@depend - - - ExternalProductionEntry'
  ProcessCommand:
    - '@depend - - - ExternalProductionEntry'
    - '@depend - - - ExternalProductionEntryProcessor'
  ReviseCommand:
    - '@depend - - - ExternalProductionEntry'

js mediumSeaGreen:
  BlockedProductionRecordsSidebar:
    - '@depend - - - BlockedProductionRecordsContext'
  BlockedProductionRecordsView:
    - '@depend - - - BlockedProductionRecordsContext'
    - '@depend - - - BlockedProductionRecordsSidebar'
    - '@depend - - - DeleteConfirmation'
    - '@depend - - - WipErrors'
  BlockedProductionRecordsContext:
  BlockedProductionRecordsProvider:
    - '@depend - - - BlockedProductionRecordsContext'
    - '@depend - - - DeleteExternalProductionEntryMutation'
    - '@depend - - - ProcessExternalProductionEntriesMutation'
    - '@depend - - - EditExternalProductionEntryMutation'
    - '@depend - - - GraphqlController'
  DeleteConfirmation:
  WipErrors:

graphql palegreen:
  GraphqlController:
    - '@hidden'
    - '@stereotype ProductionManagementPrivateGraphqlApi'
    - '@depend - - - Job'
  DeleteExternalProductionEntryMutation:
    - '@depend - - - ExternalProductionEntryQueue'
  ProcessExternalProductionEntriesMutation:
    - '@depend - - - BlockedProductionEntriesActionFactory'
    - '@depend - - - BlockedProductionEntriesProcessor'
    - '@depend - MVP - FirstBlockedProductionEntriesProcessor'
  EditExternalProductionEntryMutation:
    - '@depend - - - ExternalProductionEntryQueue'

xml_api pink:
  JobsController:
    - '@stereotype Api::Xml::Actions'
    - '@depend - - - AddExternalProductionEntryService'
    - '@depend - - - AddExternalProductionService'
    - '@depend - - - AddProductionXmlParameters'
  AddExternalProductionEntryService:
    - '@depend - - - AddProductionXmlParameters'
    - '@depend - create - ExternalProductionEntry'
    - '@depend - - - ExternalProductionEntryQueue'
  AddExternalProductionService:
    - '@hidden'
    - '@stereotype deprecated'
    - '@depend - - - ProductionCreateCommand'
  AddProductionXmlParameters:

  FindActiveJobService:
    - '@hidden'
    - '@depend - - - FindActiveOnLine'
  FindActiveOnLine:
    - '@hidden'

miscellaneous lightblue:
  Job:
    - '@has - - - ExternalProductionEntry'
    - '@has - - - Production'
  Production:
    - '@has - - - ExternalProductionEntry'
  ProductionCreateCommand:
    - '@depend - create - Production'
  WipMessage:
    - '@hidden'
