config:
  UomCachingRoot:
    - '@hidden'
  UMLOptions:
    - '@opt vertical'
    - '@opt attributes'
    - '@opt operations'
    - '@hidden'

framework lightgray:
  BaseCsvPresenter:
    - '@hidden'
  ColumnDefinitionInterpreter:
    - '@hidden'
    - '@depend - - - SkusImporter'
  CsvImporter:
    - '@depend - - - ColumnDefinitionInterpreter'
    - '@depend - - - FieldValidations'
    - 'void csv_import() {}'
  FieldValidations:
    - '@depend - - - UnitOfMeasureRepo'

uom lightblue:
  UomDataBuilderForCustomUoms:
    - '@depend - - - UnitOfMeasureRepo'
  UomDataBuilderForStandardUoms:
    - '@depend - - - UnitOfMeasureRepo'
  UomRatioFactory:
    - '@depend - - - UnitOfMeasureRepo'
  UomRatiosAndContextUpserter:
    - '@depend - - - UnitOfMeasureRepo'
    - '@depend - - - UomRatiosUpserter'
  UomRatiosUpserter:
    - '@depend - - - UnitOfMeasureRepo'
    - '@depend - - - UomRatioFactory'
  UpdateWithUomFields:
    - '@depend - - - UomDataBuilderForCustomUoms'
    - '@depend - - - UomDataBuilderForStandardUoms'
    - '@depend - - - UomRatiosAndContextUpserter'
  UnitOfMeasureRepo:
    - '@stereotype module'
    - 'void active_uoms_for() {}'
    - 'void by_id() {}'
    - 'void by_label() {}'
    - 'void uoms_for() {}'

callers palegreen:
  ImportFromAnotherSku:
    - '@stereotype module'
    - '@depend - - - UomRatiosAndContextUpserter'
  CreateFromScenario:
    - '@depend - - - UpdateWithUomFields'
  Creating:
    - '@depend - - - UpdateWithUomFields'
  EdiInbound888:
    - '@depend - - - UpdateWithUomFields'
  SkuRepository:
    - '@depend - - - UpdateWithUomFields'

sku lightcoral:

  SkusPresenter extends BaseCsvPresenter:
    - '@hidden'
  SkusImporter extends CsvImporter:
    - '@depend - - - SkusPresenter'
    - '@depend - - - UpdateWithUomFields'

  UomRatiosImporter extends CsvImporter:
    - '@depend - - - UomRatiosAndContextUpserter'
