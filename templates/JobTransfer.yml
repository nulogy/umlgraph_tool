config:
  JobTransferRoot:
    - '@hidden'
  UMLOptions:
    - '@opt vertical'
    - '@opt attributes'
    - '@opt operations'
    - '@hidden'

graphql cornsilk:
  MoveFactory:
  TransferMaterialsWorkflow:
    - '@depend - - - UnitMoveTransfersLegacy'
    - '@depend - - - UnitMoveTransfers'
    - '@depend - - - TransferFromSourceJob'
    - '@depend - - - TransferableWipEventsCollector'
    - '@composed - - - SourceJobDecorator'
    - '@composed - - - WorkflowValidator'
    - 'void transfer_from_jobs() {}'
  TransferFromSourceJob:
  SourceJobsQuery:
  SourceJobDecorator:
  TransferableWipEventsCollector:
  UnitMoveFactory:
  UnitMoveTransfers:
    - '@has - - - SourceJobDecorator'
    - '@depend - - - MoveFactory'
    - '@depend - - - UnitMoveFactory'
  UnitMoveTransfersLegacy:
    - '@depend - - - JobLotExpiriesAdjuster'
    - '@depend - - - MoveFactory'
    - '@depend - - - UnitMover'
    - '@has - - - SourceJobDecorator'
  WorkflowValidator:


controllers lightblue:
  TransferMaterialsMutation:
    - '@depend - - - SourceJobsQuery'
    - '@depend - - - TransferMaterialsWorkflow'
    - 'void resolve() {}'
  JobsController:
    - '@depend - - - AcceptLineMaterialsService'
    - '@depend - - - SourceJobsQuery'
    - 'void accept_line_materials() {}'
  MoveOutController:
    - '@depend - - - MoveOutOfWipService'
    - 'void perform() {}'
  SimpleJobsController:
    - '@depend - - - AcceptLineMaterialsService'
    - 'void accept_materials() {}'
  MobileUnitMovesController:
    - '@depend - - - MobileUnitMovesService'
  UnitMovesController:
    - '@depend - - - JobLotExpiriesAdjuster'
    - '@depend - - - UnitMoveCreator'
    - 'void create_from_expected() {}'
    - 'void create_unit_move() {}'

jobs lightgreen:
  AcceptLineMaterialsService:
    - '@depend - - - Job'
  JobLotExpiriesAdjuster:
    - '@hidden'
  Job:
    - 'void accept_line_materials() {}'
    - '@depend - - - JobLotExpiriesAdjuster'
    - '@depend - - - UnitMover'

moves lightcoral:
  Move:
  MoveOutOfWipService:
    - '@depend - - - UnitMover'
  MovesMediator:
    - '@depend - - - InventoryAssignmentValidator'
  MovesActualizer:
    - '@composed - - - MovesMediator'
    - '@has - - - Move'
  UnitMoveCreator:
    - '@depend - - - UnitMover'
  UnitMover:
    - '@depend - - - MovesActualizer'
    - '@has - - - Move'
    - 'void move_units() {}'
  MobileUnitMovesService:
    - '@depend - - - UnitMoveCreator'

inventory plum:
  InventoryAssignmentValidator:
    - 'void validate_pallet_change() {}'
