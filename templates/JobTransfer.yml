config:
  JobTransferRoot:
    - '@hidden'
  UMLOptions:
    - '@opt vertical'
    - '@opt attributes'
    - '@opt operations'
    - '@hidden'

graphql cornsilk:
  TransferMaterialsMutation:
    - '@depend - - - TransferMaterialsWorkflow'
    - 'void resolve() {}'
  TransferMaterialsWorkflow:
    - '@depend - - - TransferMaterialsLegacy'
    - '@depend - - - TransferMaterialsRework'
    - '@depend - - - TransferMaterialsFromSourceJob'
    - '@depend - - - TransferableWipEventsCollector'
    - '@composed - - - TransferMaterialsSourceJob'
    - '@composed - - - TransferMaterialsValidator'
    - 'void transfer_from_jobs() {}'
  TransferMaterialsFromSourceJob:
  TransferMaterialsSourceJobsQuery:
  TransferMaterialsLegacy:
    - '@depend - - - JobLotExpiriesAdjuster'
    - '@depend - - - UnitMover'
    - '@has - - - TransferMaterialsSourceJob'
  TransferMaterialsRework:
    - '@has - - - TransferMaterialsSourceJob'
  TransferMaterialsSourceJob:
  TransferMaterialsValidator:
  TransferableWipEventsCollector:

controllers lightblue:
  JobsController:
    - '@depend - - - AcceptLineMaterialsService'
    - '@depend - - - TransferMaterialsSourceJobsQuery'
    - 'void accept_line_materials() {}'
  MoveOutController:
    - '@depend - - - MoveOutOfWipService'
    - 'void perform() {}'
  SimpleJobsController:
    - '@depend - - - AcceptLineMaterialsService'
    - 'void accept_materials() {}'
  MobileUnitMovesController:
    - '@depend - - - MobileUnitMovesService'
  UnitMovesController:
    - '@depend - - - JobLotExpiriesAdjuster'
    - '@depend - - - UnitMoveCreator'
    - 'void create_from_expected() {}'
    - 'void create_unit_move() {}'

jobs lightgreen:
  AcceptLineMaterialsService:
    - '@depend - - - Job'
  JobLotExpiriesAdjuster:
    - '@hidden'
  Job:
    - 'void accept_line_materials() {}'
    - '@depend - - - JobLotExpiriesAdjuster'
    - '@depend - - - UnitMover'

moves lightcoral:
  Move:
  MoveOutOfWipService:
    - '@depend - - - UnitMover'
  MovesMediator:
    - '@depend - - - InventoryAssignmentValidator'
  MovesActualizer:
    - '@composed - - - MovesMediator'
    - '@has - - - Move'
  UnitMoveCreator:
    - '@depend - - - UnitMover'
  UnitMover:
    - '@depend - - - MovesActualizer'
    - '@has - - - Move'
    - 'void move_units() {}'
  MobileUnitMovesService:
    - '@depend - - - UnitMoveCreator'

inventory plum:
  InventoryAssignmentValidator:
    - 'void validate_pallet_change() {}'
