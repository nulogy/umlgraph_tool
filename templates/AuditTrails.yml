config:
  AuditTrailsRoot:
    - '@hidden'
  UMLOptions:
    - '@opt vertical'
    - '@opt attributes'
    - '@opt operations'
    - '@hidden'

audit_trails palegreen:
  ChangeRecord:

  DisplayTypeLookup:

  NaturalKeyLookup:

  RecordIdentifier:
    - 'String display_type;'

  RecordSnapshot:

  Snapshotter:
    - 'void record() {}'
    - 'void record_group() {}'
    - '@depend - - - DisplayTypeLookup'
    - '@depend - - - RecordIdentifier'

  SnapshotTakerLookup:
    - '@depend - - - SnapshotValidator'

  SnapshotValidator:

  ShipmentSnapshotTaker:
    - '@depend - - - RecordIdentifier'

  SkuSnapshotTaker:
    - '@depend - - - RecordIdentifier'

snapshot_takers lightblue:
  AssemblyProcedureSnapshotTaker extends Snapshotter:
  AssemblyStepSnapshotTaker extends Snapshotter:
  AttachmentSnapshotTaker extends Snapshotter:
  AutoQuarantineOverrideSnapshotTaker extends Snapshotter:
  BomItemSnapshotTaker extends Snapshotter:
  BomVersionSnapshotTaker extends Snapshotter:
  JobLotExpirySnapshotTaker extends Snapshotter:
  JobReconciliationCountSnapshotTaker extends Snapshotter:
  JobReconciliationRecordSnapshotTaker extends Snapshotter:
  PalletShipmentSnapshotTaker extends Snapshotter:
  ProductionSnapshotTaker extends Snapshotter:
  RejectedItemSnapshotTaker extends Snapshotter:
  ShipmentSnapshotTaker extends Snapshotter:
  SkuSnapshotTaker extends Snapshotter:
  SubcomponentConsumptionSnapshotTaker extends Snapshotter:
  UnitOfMeasureSnapshotTaker extends Snapshotter:
  UnitShipmentSnapshotTaker extends Snapshotter:
  UomContextSnapshotTaker extends Snapshotter:
  UomRatioSnapshotTaker extends Snapshotter:
